<div #rendererContainer class="viewer-container"></div>

<div class="pc-map-controls">
  <div class="control-group">
    <label>
      Percentage
      <input type="range" min="0" max="100" [(ngModel)]="percentage" (ngModelChange)="onPercentageChange()" />
    </label>
    <span>{{ percentage }}%</span>
  </div>

  <div class="control-group">
    <label>
      Click radius
      <input type="range" min="0.5" max="5" step="0.1" [(ngModel)]="clickRadius" (ngModelChange)="onSettingsChange()" />
    </label>
    <span>{{ clickRadius }}</span>
  </div>
  <div class="control-group">
    <label>
      Max click duration
      <input type="range" min="0.5" max="5" step="0.1" [(ngModel)]="maxClickDuration" (ngModelChange)="onSettingsChange()" />
    </label>
    <span>{{ maxClickDuration }}</span>
  </div>
  <div class="control-group">
    <label>
      Click strength
      <input type="range" min="0.5" max="5" step="0.1" [(ngModel)]="clickStrength" (ngModelChange)="onSettingsChange()" />
    </label>
    <span>{{ clickStrength }}</span>
  </div>

  <div class="control-group">
    <label>
      Move window
      <input type="range" min="0.1" max="0.6" step="0.01" [(ngModel)]="moveWindow" (ngModelChange)="onSettingsChange()" />
    </label>
    <span>{{ moveWindow }}</span>
  </div>
  <div class="control-group">
    <label>
      Center radius
      <input type="range" min="0.02" max="0.3" step="0.01" [(ngModel)]="centerRadius" (ngModelChange)="onSettingsChange()" />
    </label>
    <span>{{ centerRadius }}</span>
  </div>
  <div class="control-group">
    <label>
      Center falloff
      <input type="range" min="0.01" max="0.15" step="0.01" [(ngModel)]="centerFalloff" (ngModelChange)="onSettingsChange()" />
    </label>
    <span>{{ centerFalloff }}</span>
  </div>

  <div class="control-group">
    <label>
      Particle size
      <input type="range" min="0.5" max="4" step="0.1" [(ngModel)]="particleSize" (ngModelChange)="onSettingsChange()" />
    </label>
    <span>{{ particleSize }}</span>
  </div>

  <div class="control-group">
    <label>
      Background color
      <input type="color" [(ngModel)]="backgroundColor" (ngModelChange)="onBackgroundChange()" />
    </label>
    <label>
      Background alpha
      <input type="range" min="0" max="1" step="0.05" [(ngModel)]="backgroundAlpha" (ngModelChange)="onBackgroundChange()" />
    </label>
    <span>{{ (backgroundAlpha * 100) | number:'1.0-0' }}%</span>
  </div>
</div>
