<div [ngStyle]="generateStyleVariables()" class="planet-container">
  <div class="wrapper">
    <div class="p-color-2">
      <canvas #canvas class="shader-canvas"></canvas>
    </div>

    <div class="atmosphere-color"></div>

    @if (hasRings) {
      <div class="rings">
        <div class="ring-left"></div>
      </div>
      <div style="z-index: 1;" class="rings">
        <div class="ring-right"></div>
      </div>
    }

    <div [ngStyle]="planetShadowStyles" class="p-mask"></div>
  </div>

  <!-- Simple control panel to adjust all inputs from the UI -->
  <div class="planet-controls">
    <div class="control-group">
      <label>
        Primary color
        <input type="color" [(ngModel)]="primaryColor" />
      </label>
      <label>
        Secondary color
        <input type="color" [(ngModel)]="secondaryColor" />
      </label>
    </div>

    <div class="control-group">
      <label>
        Has rings
        <input type="checkbox" [(ngModel)]="hasRings" />
      </label>
      <label>
        Rings color
        <input type="color" [(ngModel)]="ringsColor" />
      </label>
      <label>
        Rings distance
        <input type="range"
               min="0"
               max="800"
               step="10"
               [ngModel]="+ringsDistance.replace('px', '')"
               (ngModelChange)="ringsDistance = $event + 'px'" />
      </label>
    </div>

    <div class="control-group">
      <label>
        Night percentage
        <input type="range" min="0" max="100" [(ngModel)]="nightPercentage" />
      </label>
      <span>{{ nightPercentage }}%</span>
    </div>

    <div class="control-group">
      <label>
        Movement intensity
        <input type="range" min="0" max="0.2" step="0.01" [(ngModel)]="movementIntensity" />
      </label>
      <label>
        X rotation
        <input type="range" min="-180" max="180" [(ngModel)]="xRotation" />
      </label>
      <label>
        Y rotation
        <input type="range" min="-180" max="180" [(ngModel)]="yRotation" />
      </label>
    </div>

    <div class="control-group">
      <label>
        Has perspective
        <input type="checkbox" [(ngModel)]="hasPerspective" />
      </label>
      <label>
        Has atmosphere
        <input type="checkbox" [(ngModel)]="hasAtmopshere" />
      </label>
    </div>
  </div>
</div>
